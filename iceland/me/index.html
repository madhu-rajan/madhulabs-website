<title>Iceland Trip — Locked</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<style>
  :root { --bg:#0f172a; --surface:#1e293b; --border:#334155; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --red:#f87171; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:24px; }
  .gate { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:28px 32px; max-width:380px; width:100%; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
  .gate h1 { margin:0 0 4px; font-size:18px; color:var(--accent); }
  .gate p { margin:0 0 18px; color:var(--muted); font-size:13px; line-height:1.5; }
  .gate label { display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .gate input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border 0.15s; }
  .gate input:focus { border-color:var(--accent); }
  .gate button { margin-top:14px; width:100%; background:var(--accent); color:var(--bg); border:none; border-radius:6px; padding:10px 14px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .gate button:hover { filter:brightness(1.1); }
  .gate .err { margin-top:10px; color:var(--red); font-size:12px; min-height:16px; }
  .gate .hint { margin-top:14px; padding-top:14px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); text-align:center; }
  #loading { display:none; text-align:center; color:var(--muted); font-size:13px; padding:40px 0; }
</style>
</head>

  const blob = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt = blob.slice(0, 16);
  const iters = (blob[16] << 24) | (blob[17] << 16) | (blob[18] << 8) | blob[19];
  const ct = blob.slice(20);
  const keyMat = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    { name: 'PBKDF2' }, false, ['deriveBits']
  );
  const keyBits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt: salt, iterations: iters, hash: 'SHA-256' },
    keyMat, 256
  );
  const key = new Uint8Array(keyBits);
  const pt = new Uint8Array(ct.length);
  let counter = 0;
  let pos = 0;
  while (pos < ct.length) {
    const cb = new Uint8Array(8);
    new DataView(cb.buffer).setBigUint64(0, BigInt(counter), false);
    const buf = new Uint8Array(40);
    buf.set(key, 0);
    buf.set(cb, 32);
    const digest = new Uint8Array(await crypto.subtle.digest('SHA-256', buf));
    const end = Math.min(pos + 32, ct.length);
    for (let i = 0; i < end - pos; i++) pt[pos + i] = ct[pos + i] ^ digest[i];
    pos = end;
    counter++;
  }
  return new TextDecoder().decode(pt);
}

async function tryUnlock(silent) {
  const pw = silent ? sessionStorage.getItem(SS_KEY) : document.getElementById('pw').value;
  if (!pw) { if (!silent) showErr('Enter password'); return; }
  const btn = document.getElementById('unlock-btn');
  if (btn) btn.textContent = 'Decrypting…';
  try {
    const txt = await decryptBlob(ENC_BLOB, pw);
    if (!txt.startsWith(MAGIC)) throw new Error('wrong');
    sessionStorage.setItem(SS_KEY, pw);
    const html = txt.slice(MAGIC.length);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    // Replace the entire document with the decrypted HTML so embedded scripts re-run.
    setTimeout(() => { document.open(); document.write(html); document.close(); }, 30);
  } catch (e) {
    sessionStorage.removeItem(SS_KEY);
    if (!silent) showErr('Wrong password');
    if (btn) btn.textContent = 'Unlock';
  }
}

function showErr(msg) { document.getElementById('err').textContent = msg; }

document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem(SS_KEY)) tryUnlock(true);
  const input = document.getElementById('pw');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(false); });
});
